# Default (dev) - uses H2 in-memory
spring.datasource.url=jdbc:h2:mem:cricketdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# JWT
app.jwt.secret=cricketScorerSuperSecretKeyForJWT2024MustBe256BitsLong!
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000,https://*.vercel.app
