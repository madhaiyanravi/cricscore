# Default profile - prod only, no H2
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000
app.cors.allowed-origins=${CORS_ORIGINS}

app.vapid.public-key=${VAPID_PUBLIC_KEY:placeholder}
app.vapid.private-key=${VAPID_PRIVATE_KEY:placeholder}
app.vapid.subject=${VAPID_SUBJECT:mailto:admin@cricscore.app}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:placeholder}
cloudinary.api-key=${CLOUDINARY_API_KEY:placeholder}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:placeholder}

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
server.port=10000
